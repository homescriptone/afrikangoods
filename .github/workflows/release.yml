name: Build Theme Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    name: Build theme zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "VERSION=1.0.$COUNT" >> $GITHUB_OUTPUT

      - name: Inject version from commit
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Building version: $VERSION"
          sed -i "s/Version: .*/Version: $VERSION/" style.css
          sed -i "s/define( 'AFRIKANGOODS_THEME_VERSION', '.*' )/define( 'AFRIKANGOODS_THEME_VERSION', '$VERSION' )/" functions.php

      - name: Generate zip
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: zip
          filename: afrikangoods.zip
          exclusions: >-
            *.git*
            *.github*
            *.distignore
            *node_modules*
            *package-lock.json
            *package.json
            *composer.json
            *composer.lock
            *.phpcs.xml.dist
            *phpcs.xml
            *.editorconfig
            *.DS_Store
            *Thumbs.db
            *.md

      - name: Create tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          echo "Tag: $TAG"

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes \
            --target "${{ github.sha }}" \
            afrikangoods.zip
